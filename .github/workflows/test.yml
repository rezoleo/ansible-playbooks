name: Lint & Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
        with:
          enable-cache: true
          prune-cache: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install the project
        run: uv sync --locked --no-python-downloads

      - name: Run Ruff
        id: ruff
        continue-on-error: true # Allow other tasks to continue if ruff fails
        run: uv run ruff check

      - name: Run Ansible-Lint
        id: ansible_lint
        continue-on-error: true # Allow uploading SARIF report if ansible-lint fails
        run: uv run ansible-lint --offline --sarif-file ansible-lint.sarif.json

      - name: Upload Ansible-Lint SARIF
        uses: github/codeql-action/upload-sarif@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4.32.4
        with:
          sarif_file: ansible-lint.sarif.json
          category: ansible-lint

      - name: Fail job if any lint failed
        if: steps.ruff.outcome == 'failure' || steps.ansible_lint.outcome == 'failure'
        run: |
          echo "::error::One or more linters failed"
          exit 1
